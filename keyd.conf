# Target all keyboard devices
[ids]
*

# ---------------------------------------------------------
# Main Layer: Default behavior modifications
# ---------------------------------------------------------
[main]
# Dual-function Caps Lock:
# - Acts as Control when held (perfect for shortcuts)
# - Acts as Escape when tapped (great for Vim and exiting menus)
capslock = overload(control, esc)

# ---------------------------------------------------------
# Alt Layer: Triggered while holding Alt
# ---------------------------------------------------------
[alt]
# Secondary Enter keys (Caps or Semicolon)
capslock = enter
; = enter

# Browser & Tab Management
t = C-t      # Open new tab
q = C-tab    # Cycle through tabs

# System Clipboard
c = C-c      # Copy
v = C-v      # Paste

# WASD Directional Navigation
w = up
a = left
s = down
d = right

# Vim-style Directional Navigation
h = left
j = down
k = up
l = right

# Quality of Life
e = backspace # Thumb-accessible backspace

# Media & Volume Control
1 = previoussong
2 = playpause
3 = nextsong
4 = volumedown
5 = volumeup

# ---------------------------------------------------------
# Meta Layer: Triggered while holding Meta (Super/Windows key)
# ---------------------------------------------------------
[meta]
# Maps Meta+Capslock to Colon (Shift + ;)
capslock = S-;

# ---------------------------------------------------------
# Alt + Shift Layer: Advanced combos
# ---------------------------------------------------------
[alt+shift]
w = C-w           # Close current tab/window
l = C-l           # Jump to browser address bar
e = C-backspace   # Delete entire word backwards
