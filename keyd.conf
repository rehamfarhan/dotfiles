[ids]
*

[main]
# Maps Caps Lock to Escape when tapped, and Control when held
# (Pro tip: Having Control on Caps is a game changer for shortcuts)
capslock = overload(control, esc)

[alt]
# Your requested Return binding
capslock = enter

# Maps Alt + Space to Ctrl + L
space = C-l

# Your WASD Navigation
w = up
a = left
s = down
d = right

# --- The "Hella Helpful" Additions ---

# Quick Deletes (No more reaching for Backspace/Delete)
q = backspace
e = delete

# Home/End/Page Up/Page Down (Completes the Nav suite)
r = pageup
f = pagedown
z = home
x = end

# Media Controls (Because reaching for F-keys is a chore)
1 = previoussong
2 = playpause
3 = nextsong
4 = volumedown
5 = volumeup

[meta]
capslock = S-;
